<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>加入社群 | 龙虾助手 - OpenClaw Helper</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  line-height:1.7;color:#333;
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#fef2f0 0%,#fff5f0 50%,#fdf2f8 100%);
  padding:40px 20px;
}
.card{
  max-width:420px;width:100%;
  background:#fff;border-radius:16px;
  box-shadow:0 4px 24px rgba(232,68,42,.1),0 1px 4px rgba(0,0,0,.06);
  overflow:hidden;
}
.hero{
  text-align:center;padding:28px 24px 20px;
  background:linear-gradient(135deg,rgba(232,68,42,.06) 0%,rgba(240,112,48,.06) 100%);
  border-bottom:1px solid rgba(232,68,42,.1);
}
.logo{font-size:48px;line-height:1;margin-bottom:8px;filter:drop-shadow(0 2px 6px rgba(0,0,0,.12))}
.title{
  font-size:22px;font-weight:800;letter-spacing:1px;
  background:linear-gradient(135deg,#e8442a 0%,#f07030 45%,#c0392b 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.subtitle{font-size:13px;color:#999;margin-top:2px;letter-spacing:.3px}
.body{padding:24px}
.section-title{
  font-size:14px;font-weight:700;color:#333;
  margin-bottom:12px;text-align:center;
}
.qr-wrap{
  text-align:center;padding:16px;
  background:rgba(0,0,0,.02);border-radius:12px;
  margin-bottom:16px;
}
.qr-wrap img{
  width:220px;height:220px;border-radius:8px;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
}
.qr-hint{
  font-size:12px;color:#888;margin-top:8px;
}
.links{display:flex;flex-direction:column;gap:8px;margin-top:16px}
.link-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;border-radius:10px;
  border:1px solid rgba(0,0,0,.06);
  text-decoration:none;color:#333;
  transition:background .15s,border-color .15s,transform .12s;
}
.link-item:hover{
  background:rgba(232,68,42,.04);
  border-color:rgba(232,68,42,.2);
  transform:translateX(2px);
}
.link-icon{font-size:20px;flex-shrink:0;width:28px;text-align:center}
.link-body{flex:1}
.link-label{font-size:13px;font-weight:600}
.link-desc{font-size:11px;color:#999;margin-top:1px}
.link-arrow{color:#ccc;font-size:14px;transition:color .15s}
.link-item:hover .link-arrow{color:#e8442a}
.footer{
  text-align:center;padding:16px 24px 20px;
  font-size:11px;color:#bbb;
  border-top:1px solid rgba(0,0,0,.04);
}
.footer a{color:#e8442a;text-decoration:none}
.footer a:hover{text-decoration:underline}
</style>
</head>
<body>

<div class="card">
  <div class="hero">
    <div class="logo">🦞</div>
    <div class="title">龙虾助手</div>
    <div class="subtitle">OpenClaw Helper · 用户社群</div>
  </div>

  <div class="body">
    <div class="section-title">📱 扫码加入微信群</div>
    <div class="qr-wrap">
      <img src="qrcode.jpg" alt="微信群二维码">
      <div class="qr-hint">微信扫一扫，加入龙虾助手用户交流群</div>
    </div>

    <div class="section-title">🔗 更多联系方式</div>
    <div class="links">
      <a class="link-item" href="https://github.com/henuwolf/openclaw-extend" target="_blank">
        <span class="link-icon">🐙</span>
        <div class="link-body">
          <div class="link-label">GitHub 仓库</div>
          <div class="link-desc">源码查看、Issue 反馈、功能建议</div>
        </div>
        <span class="link-arrow">→</span>
      </a>
      <a class="link-item" href="mailto:xuyangbo@gmail.com">
        <span class="link-icon">📧</span>
        <div class="link-body">
          <div class="link-label">邮件联系</div>
          <div class="link-desc">xuyangbo@gmail.com</div>
        </div>
        <span class="link-arrow">→</span>
      </a>
      <a class="link-item" href="index.html">
        <span class="link-icon">🔒</span>
        <div class="link-body">
          <div class="link-label">隐私政策</div>
          <div class="link-desc">了解我们如何保护您的数据</div>
        </div>
        <span class="link-arrow">→</span>
      </a>
    </div>
  </div>

  <div class="footer">
    Made with ❤️ by <a href="https://github.com/henuwolf" target="_blank">henuwolf</a>
  </div>
</div>

</body>
</html>
